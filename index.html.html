  function processImageUpload(file, maxSize) {
    maxSize = maxSize || 2 * 1024 * 1024;
    return new Promise((resolve, reject) => {
      if (!file) return reject('Nenhum arquivo selecionado.');
      if (!file.type.startsWith('image/')) return reject('Envie um arquivo de imagem válido.');
      if (file.size > maxSize) return reject('O arquivo excede o limite de 2 MB.');
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          if (img.width !== img.height) return reject('A imagem deve ser quadrada (proporção 1:1).');
          const canvas = document.createElement('canvas');
          canvas.width = 196; canvas.height = 196;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, 196, 196);
          canvas.toBlob((blob) => { if (blob) resolve(blob); else reject('Falha ao processar a imagem.'); }, 'image/jpeg', 0.9);
        };
        img.onerror = () => reject('Não foi possível ler a imagem.');
        img.src = e.target.result;
      };
      reader.onerror = () => reject('Não foi possível ler o arquivo.');
      reader.readAsDataURL(file);
    });
  }

  function processGalleryImage(file, maxSize) {
    maxSize = maxSize || 3 * 1024 * 1024;
    return new Promise((resolve, reject) => {
      if (!file) return reject('Nenhum arquivo selecionado.');
      if (!file.type.startsWith('image/')) return reject('Envie um arquivo de imagem válido.');
      if (file.size > maxSize) return reject('O arquivo excede o limite de 3 MB.');
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const size = Math.min(img.width, img.height, 600);
          const canvas = document.createElement('canvas');
          canvas.width = size; canvas.height = size;
          const ctx = canvas.getContext('2d');
          const offsetX = (img.width - size) / 2;
          const offsetY = (img.height - size) / 2;
          ctx.drawImage(img, offsetX, offsetY, size, size, 0, 0, size, size);
          canvas.toBlob((blob) => { if (blob) resolve(blob); else reject('Falha ao processar a imagem.'); }, 'image/jpeg', 0.88);
        };
        img.onerror = () => reject('Não foi possível ler a imagem.');
        img.src = e.target.result;
      };
      reader.onerror = () => reject('Não foi possível ler o arquivo.');
      reader.readAsDataURL(file);
    });
  }

    const feedEl = document.getElementById('dashFeed');
    if (!posts || posts.length === 0) {
      feedEl.innerHTML = `<div class="empty-state"><h3>Seu feed está vazio</h3><p>Faça sua primeira postagem ou adicione amigos para ver o que eles estão compartilhando.</p></div>`;
    } else {
      feedEl.innerHTML = posts.map(p => renderPostHTML(p)).join('');
      
      document.querySelectorAll('.post-action-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const postId = btn.dataset.postid;
          const action = btn.dataset.action;
          if (action === 'like' || action === 'dislike' || action === 'fire') {
            window.toggleReaction(postId, action);
          } else if (action === 'comment') {
            const section = document.querySelector(`.comment-section[data-postid="${postId}"]`);
            if (section) section.classList.toggle('show');
          } else if (action === 'repost') {
            window.repost(postId);
          }
        });
      });

      document.querySelectorAll('.comment-input-area button').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation();
          const postId = btn.dataset.postid;
          const input = document.querySelector(`.comment-input-area input[data-postid="${postId}"]`);
          if (input && input.value.trim()) {
            await db.from('comments').insert([{ post_id: postId, user_id: profile.id, content: input.value.trim() }]);
            toast('Comentário adicionado!', 'success');
            render();
          }
        });
      });
    }
  }

    function renderPostHTML(p) {
    const likes = p.reactions ? p.reactions.filter(r => r.type === 'like').length : 0;
    const dislikes = p.reactions ? p.reactions.filter(r => r.type === 'dislike').length : 0;
    const fires = p.reactions ? p.reactions.filter(r => r.type === 'fire').length : 0;
    const userLiked = p.reactions ? p.reactions.some(r => r.type === 'like' && r.user_id === profile.id) : false;
    const userDisliked = p.reactions ? p.reactions.some(r => r.type === 'dislike' && r.user_id === profile.id) : false;
    const userFired = p.reactions ? p.reactions.some(r => r.type === 'fire' && r.user_id === profile.id) : false;

    const pInitial = p.author?.name?.charAt(0).toUpperCase() || '?';
    const pAvatar = p.author?.avatar_url ? `<img src="${p.author.avatar_url}">` : `<div class="message-avatar-placeholder">${pInitial}</div>`;

    let contentHTML = '';
    if (p.parent_post) {
      const op = p.parent_post;
      const opInitial = op.parent_author?.name?.charAt(0).toUpperCase() || '?';
      const opAvatar = op.parent_author?.avatar_url ? `<img src="${op.parent_author.avatar_url}">` : `<div class="message-avatar-placeholder">${opInitial}</div>`;
      contentHTML = `
        <div class="dash-post-content">
          <div class="embedded-post">
            <div class="embedded-post-header">
              <div class="message-avatar" style="width:24px;height:24px;" onclick="viewProfile('${op.user_id}')">${opAvatar}</div>
              <span style="cursor:pointer;" onclick="viewProfile('${op.user_id}')">${escapeHtml(op.parent_author?.name || 'Anônimo')}</span>
            </div>
            <div class="message-body" style="padding-left:0; margin-bottom:0.5rem;">${sanitizeHTML(op.content)}</div>
            ${op.image_url ? `<img src="${op.image_url}" class="post-image" style="max-width:100%; border-radius:0.4rem; margin-top:0.5rem;">` : ''}
          </div>
        </div>
      `;
    } else {
      contentHTML = `
        <div class="dash-post-content">
          ${p.content ? `<div class="message-body" style="padding-left:0;">${sanitizeHTML(p.content)}</div>` : ''}
          ${p.image_url ? `<img src="${p.image_url}" class="post-image" style="max-width:100%; border-radius:0.4rem; margin-top:0.5rem;">` : ''}
        </div>
      `;
    }

    const commentsHTML = (p.comments || []).map(c => `
      <div class="comment-item">
        <div class="comment-item-avatar" onclick="viewProfile('${c.user_id}')">${c.commenter?.avatar_url ? `<img src="${c.commenter.avatar_url}">` : `<div class="ph">${c.commenter?.name?.charAt(0).toUpperCase() || '?'}</div>`}</div>
        <div class="comment-item-body">
          <div class="comment-item-author" onclick="viewProfile('${c.user_id}')">${escapeHtml(c.commenter?.name || 'Anônimo')}</div>
          <div class="comment-item-content">${sanitizeHTML(c.content)}</div>
        </div>
      </div>
    `).join('');

    return `
      <div class="dash-post">
        <div class="dash-post-header">
          <div class="message-avatar" onclick="viewProfile('${p.user_id}')">${pAvatar}</div>
          <div style="flex:1;">
            <div class="message-author" onclick="viewProfile('${p.user_id}')">${escapeHtml(p.author?.name || 'Anônimo')}</div>
            <div class="message-time">${formatDate(p.created_at)}</div>
          </div>
          ${p.user_id === profile.id ? `<button class="gallery-card-delete" style="position:relative; opacity:1; border:none;" onclick="deletePost('${p.id}')">×</button>` : ''}
        </div>
        ${contentHTML}
        <div class="post-actions">
          <button class="post-action-btn ${userLiked ? 'active' : ''}" data-postid="${p.id}" data-action="like">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 9V5a3 3 0 0 0-3-3l-4 9v11h11.28a2 2 0 0 0 2-1.7l1.38-9a2 2 0 0 0-2-2.3zM7 22H4a2 2 0 0 1-2-2v-7a2 2 0 0 1 2-2h3"></path></svg>
            <span class="count">${likes}</span>
          </button>
          <button class="post-action-btn ${userDisliked ? 'active' : ''}" data-postid="${p.id}" data-action="dislike">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M10 15v4a3 3 0 0 0 3 3l4-9V2H5.72a2 2 0 0 0-2 1.7l-1.38 9a2 2 0 0 0 2 2.3zm7-13h2.67A2.31 2.31 0 0 1 22 4v7a2.31 2.31 0 0 1-2.33 2H17"></path></svg>
            <span class="count">${dislikes}</span>
          </button>
          <button class="post-action-btn ${userFired ? 'active' : ''}" data-postid="${p.id}" data-action="fire" style="${userFired ? 'color:#e76f51;' : ''}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path></svg>
            <span class="count">${fires}</span>
          </button>
          <button class="post-action-btn" data-postid="${p.id}" data-action="comment">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          </button>
          <button class="post-action-btn" data-postid="${p.id}" data-action="repost">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="17 1 21 5 17 9"></polyline><path d="M3 11V9a4 4 0 0 1 4-4h14"></path><polyline points="7 23 3 19 7 15"></polyline><path d="M21 13v2a4 4 0 0 1-4 4H3"></path></svg>
          </button>
        </div>
        <div class="comment-section" data-postid="${p.id}">
          ${commentsHTML}
          <div class="comment-input-area">
            <input type="text" placeholder="Escreva um comentário..." data-postid="${p.id}">
            <button data-postid="${p.id}">Enviar</button>
          </div>
        </div>
      </div>
    `;
  }

  window.toggleReaction = async (postId, type) => {
    const { data: existing } = await db.from('reactions').select('*').eq('post_id', postId).eq('user_id', profile.id).eq('type', type).maybeSingle();
    if (existing) {
      await db.from('reactions').delete().eq('id', existing.id);
    } else {
      await db.from('reactions').insert([{ post_id: postId, user_id: profile.id, type }]);
    }
    render();
  };

  window.repost = async (postId) => {
    await db.from('posts').insert([{ user_id: profile.id, content: '', parent_post_id: postId }]);
    toast('Repostado com sucesso!', 'success');
    render();
  };

  window.deletePost = async (postId) => {
    await db.from('posts').delete().eq('id', postId);
    toast('Postagem removida.', 'success');
    render();
  };

  /* ---------- PERFIL ---------- */
  async function renderProfile() {
    const targetId = viewingProfileId || profile.id;
    const isOwn = targetId === profile.id;
    
    const { data: targetProfile, error } = await db.from('profiles').select('*').eq('id', targetId).single();
    if (error || !targetProfile) { mainContent.innerHTML = `<div class="empty-state"><h3>Perfil não encontrado</h3></div>`; return; }
    
    let headerActions = '';
    if (isOwn) {
      headerActions = `<button class="btn btn-secondary" id="editProfileBtn">Editar perfil</button>`;
    } else {
      headerActions = `<button class="btn btn-secondary" id="backFromProfileBtn" style="width:auto; margin-right: 0.5rem;">← Voltar</button>`;
      
      let friendship = null;
      const { data: f1 } = await db.from('friends').select('*').eq('requester_id', profile.id).eq('addressee_id', targetId).maybeSingle();
      if (f1) friendship = f1;
      else {
        const { data: f2 } = await db.from('friends').select('*').eq('requester_id', targetId).eq('addressee_id', profile.id).maybeSingle();
        if (f2) friendship = f2;
      }
      
      if (!friendship) {
        headerActions += `<button class="btn btn-primary" id="addFriendBtn" style="width:auto;">Adicionar</button>`;
      } else if (friendship.status === 'pending') {
        if (friendship.requester_id === profile.id) {
          headerActions += `<button class="btn btn-secondary" disabled>Pedido enviado</button>`;
        } else {
          headerActions += `<button class="btn btn-primary" id="acceptFriendBtn" data-id="${friendship.id}" style="width:auto;">Aceitar</button>`;
        }
      } else if (friendship.status === 'accepted') {
        headerActions += `<button class="btn btn-secondary" disabled>Amigos</button>`;
      }
    }

    const initial = targetProfile.name.charAt(0).toUpperCase();
    const avatarHTML = targetProfile.avatar_url ? `<img src="${targetProfile.avatar_url}" alt="${escapeHtml(targetProfile.name)}">` : `<div class="profile-avatar-placeholder">${initial}</div>`;
    const bioHTML = targetProfile.bio ? `<div class="profile-bio">${sanitizeHTML(targetProfile.bio)}</div>` : `<div class="profile-bio empty">Sem bio ainda.</div>`;
    
    const { data: facetas } = await db.from('facetas').select('*').eq('user_id', targetId).order('created_at', { ascending: false });
    const facetasGrid = (facetas || []).map(f => `
      <div class="gallery-card">
        <div class="gallery-card-image">${f.image_url ? `<img src="${f.image_url}" alt="${escapeAttr(f.name)}">` : `<div class="gallery-card-image-placeholder">${f.name.charAt(0).toUpperCase()}</div>`}</div>
        <div class="gallery-card-info"><div class="gallery-card-name">${escapeHtml(f.name)}</div><div class="gallery-card-meta">personagem</div></div>
      </div>
    `).join('');

    mainContent.innerHTML = `
      <div class="view-header"><div><div class="view-title">${isOwn ? 'Seu perfil' : 'Perfil'}</div></div><div style="display:flex; justify-content:flex-end;">${headerActions}</div></div>
      <div class="profile-card"><div class="profile-top"><div class="profile-avatar">${avatarHTML}</div><div class="profile-info"><h2>${escapeHtml(targetProfile.name)}</h2><div class="meta">membro desde ${formatDate(targetProfile.created_at)}</div></div></div>${bioHTML}</div>
      
      <div style="margin-top: 2rem; margin-bottom: 1rem; font-family: 'Cormorant Garamond', serif; font-size: 1.4rem; font-weight: 500;">Personagens (Facetas)</div>
      <div class="gallery-grid">
        ${facetasGrid || '<div class="empty-state" style="grid-column: 1 / -1;"><p>Nenhum personagem criado.</p></div>'}
      </div>
    `;
    
    if (isOwn) {
      document.getElementById('editProfileBtn').addEventListener('click', openEditProfile);
    } else {
      document.getElementById('backFromProfileBtn').addEventListener('click', goBack);
      const addBtn = document.getElementById('addFriendBtn');
      if (addBtn) addBtn.addEventListener('click', async () => {
        await db.from('friends').insert([{ requester_id: profile.id, addressee_id: targetId, status: 'pending' }]);
        toast('Pedido de amizade enviado!', 'success');
        render();
      });
      const accBtn = document.getElementById('acceptFriendBtn');
      if (accBtn) accBtn.addEventListener('click', async () => {
        await db.from('friends').update({ status: 'accepted' }).eq('id', accBtn.dataset.id);
        await loadNotifications();
        toast('Amizade aceita!', 'success');
        render();
      });
    }
  }

  async function openEditProfile() {
    const initial = profile.name.charAt(0).toUpperCase();
    const avatarPreview = profile.avatar_url ? `<img src="${profile.avatar_url}" alt="">` : `<div class="upload-preview-placeholder">${initial}</div>`;
    openModal(`
      <div class="modal-header"><h3>Editar perfil</h3><button class="modal-close" aria-label="Fechar">×</button></div>
      <div class="form-group"><label class="form-label">Nome (único)</label><input type="text" class="form-input" id="editName" value="${escapeAttr(profile.name)}"></div>
      <div class="form-group"><label class="form-label">Imagem de perfil</label><div class="upload-zone" id="avatarUploadZone"><div class="upload-preview" id="avatarPreview">${avatarPreview}</div><div class="upload-hint"><strong>Clique para enviar</strong><br>Formato <strong>1:1</strong> (quadrado).<br>Será redimensionada para <strong>196 × 196</strong>.<br>Máximo <strong>2 MB</strong>.</div><input type="file" id="avatarInput" accept="image/*" style="display:none"></div></div>
      <div class="form-group"><label class="form-label">Bio (HTML5 permitido)</label><div class="mode-toggle"><span class="mode-label">Modo</span><button class="mode-btn active" data-mode="simple" type="button">Simples</button><button class="mode-btn" data-mode="advanced" type="button">Avançado HTML</button></div><div class="toolbar" id="bioToolbar"><button class="tool-btn" data-cmd="bold" type="button"><b>B</b></button><button class="tool-btn" data-cmd="italic" type="button"><i>I</i></button><button class="tool-btn" data-cmd="underline" type="button"><u>U</u></button><div class="tool-divider"></div><button class="tool-btn" data-cmd="formatBlock" data-val="h2" type="button">Título</button><button class="tool-btn" data-cmd="formatBlock" data-val="p" type="button">Texto</button><div class="tool-divider"></div><button class="tool-btn" data-cmd="justifyLeft" type="button">⬅</button><button class="tool-btn" data-cmd="justifyCenter" type="button">⬌</button><button class="tool-btn" data-cmd="justifyRight" type="button">➡</button><div class="tool-divider"></div><button class="tool-btn" data-cmd="insertUnorderedList" type="button">• Lista</button><button class="tool-btn" data-cmd="insertOrderedList" type="button">1. Lista</button><button class="tool-btn" data-cmd="createLink" type="button">🔗 Link</button></div><div class="composer-editor" id="bioEditor" contenteditable="true" data-placeholder="Escreva sobre você...">${profile.bio ? sanitizeHTML(profile.bio) : ''}</div><textarea class="composer-textarea" id="bioTextarea" placeholder="<p>Escreva em HTML5 livre...</p>">${escapeHtml(profile.bio || '')}</textarea></div>
      <div class="edit-actions"><button class="btn btn-secondary" id="cancelEditBtn" type="button">Cancelar</button><button class="btn btn-primary" id="saveProfileBtn" type="button" style="width:auto">Salvar</button></div>
    `);
    let pendingAvatarBlob = null;
    let currentMode = 'simple';
    const editor = document.getElementById('bioEditor');
    const textarea = document.getElementById('bioTextarea');
    const toolbar = document.getElementById('bioToolbar');
    modalContent.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const mode = btn.dataset.mode;
        if (mode === currentMode) return;
        if (mode === 'advanced') textarea.value = editor.innerHTML.trim();
        else editor.innerHTML = sanitizeHTML(textarea.value);
        currentMode = mode;
        modalContent.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
        editor.classList.toggle('hide', mode !== 'simple');
        textarea.classList.toggle('show', mode === 'advanced');
        toolbar.style.display = mode === 'simple' ? 'flex' : 'none';
      });
    });
    toolbar.querySelectorAll('.tool-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault(); const cmd = btn.dataset.cmd; const val = btn.dataset.val; editor.focus();
        if (cmd === 'createLink') { const url = prompt('Endereço do link:', 'https://'); if (url) document.execCommand('createLink', false, url); }
        else if (cmd === 'formatBlock') { document.execCommand('formatBlock', false, val); }
        else { document.execCommand(cmd, false, null); }
      });
    });
    const uploadZone = document.getElementById('avatarUploadZone');
    const avatarInput = document.getElementById('avatarInput');
    const avatarPreviewEl = document.getElementById('avatarPreview');
    uploadZone.addEventListener('click', () => avatarInput.click());
    avatarInput.addEventListener('change', async () => {
      const file = avatarInput.files[0]; if (!file) return;
      try {
        const blob = await processImageUpload(file);
        pendingAvatarBlob = blob;
        const url = URL.createObjectURL(blob);
        avatarPreviewEl.innerHTML = `<img src="${url}" alt="">`;
        toast('Imagem carregada.', 'success');
      } catch(err) { toast(err, 'error'); }
    });
    document.getElementById('cancelEditBtn').addEventListener('click', closeModal);
    document.getElementById('saveProfileBtn').addEventListener('click', async () => {
      const name = document.getElementById('editName').value.trim();
      if (!name) { toast('O nome não pode ficar vazio.', 'error'); return; }
      const bio = currentMode === 'advanced' ? textarea.value : editor.innerHTML;
      let avatarUrl = profile.avatar_url;
      if (pendingAvatarBlob) {
        const path = `avatar_${profile.id}_${Date.now()}.jpg`;
        avatarUrl = await uploadFile('avatars', path, pendingAvatarBlob);
      }
      const { error: updateError } = await db.from('profiles').update({ name, bio, avatar_url: avatarUrl }).eq('id', profile.id);
      if (updateError) {
        if (updateError.message.includes('unique_username')) {
          toast('Este nome de usuário já está em uso.', 'error');
        } else {
          toast('Erro ao salvar: ' + updateError.message, 'error');
        }
        return;
      }
      await loadProfile();
      renderUserMini(); closeModal(); render();
      toast('Perfil atualizado.', 'success');
    });
    document.querySelector('.modal-close').addEventListener('click', closeModal);
  }

  /* ---------- AMIGOS ---------- */
  async function renderAmigos() {
    const { data: f1 } = await db.from('friends').select('*, addressee_id, created_at, profiles:addressee_id(name, avatar_url)').eq('requester_id', profile.id).eq('status', 'accepted');
    const { data: f2 } = await db.from('friends').select('*, requester_id, created_at, profiles:requester_id(name, avatar_url)').eq('addressee_id', profile.id).eq('status', 'accepted');
    
    const friends = [
      ...(f1||[]).map(f => ({ id: f.addressee_id, name: f.profiles?.name, avatar_url: f.profiles?.avatar_url, created_at: f.created_at })),
      ...(f2||[]).map(f => ({ id: f.requester_id, name: f.profiles?.name, avatar_url: f.profiles?.avatar_url, created_at: f.created_at }))
    ];

    const { data: pending } = await db.from('friends').select('*, profiles:requester_id(name, avatar_url)').eq('addressee_id', profile.id).eq('status', 'pending');

    let pendingHTML = '';
    if (pending && pending.length > 0) {
      pendingHTML = `<div style="margin-bottom: 2rem;"><div class="view-subtitle" style="margin-bottom:1rem;">Solicitações pendentes</div>${pending.map(p => `
        <div class="friend-card" style="display:flex; flex-direction:row; align-items:center; justify-content:space-between; margin-bottom:0.75rem;">
          <div style="display:flex; align-items:center; gap:0.75rem; cursor:pointer;" onclick="viewProfile('${p.requester_id}')">
            <div class="friend-avatar">${p.profiles?.avatar_url ? `<img src="${p.profiles.avatar_url}">` : `<div class="message-avatar-placeholder">${p.profiles?.name?.charAt(0).toUpperCase() || '?'}</div>`}</div>
            <div class="friend-name">${p.profiles?.name || 'Usuário'}</div>
          </div>
          <button class="btn btn-primary" style="width:auto; padding:0.4rem 0.8rem; font-size:0.7rem;" onclick="acceptFriend('${p.id}')">Aceitar</button>
        </div>
      `).join('')}</div>`;
    }

    const friendsGrid = friends.map(f => `
      <div class="friend-card" onclick="viewProfile('${f.id}')">
        <div class="friend-avatar">${f.avatar_url ? `<img src="${f.avatar_url}">` : `<div class="message-avatar-placeholder">${f.name?.charAt(0).toUpperCase() || '?'}</div>`}</div>
        <div class="friend-name">${escapeHtml(f.name || 'Usuário')}</div>
        <div class="friend-since">Amigos desde ${formatDate(f.created_at)}</div>
      </div>
    `).join('');

    mainContent.innerHTML = `
      <div class="view-header"><div class="view-title">Amigos</div><div class="view-subtitle">${friends.length} ${friends.length === 1 ? 'amigo' : 'amigos'}</div></div>
      ${pendingHTML}
      ${friends.length === 0 ? `<div class="empty-state"><h3>Você ainda não tem amigos</h3><p>Use a busca na barra lateral para encontrar pessoas e adicionar elas como amigas.</p></div>` : `<div class="friends-list">${friendsGrid}</div>`}
    `;
  }

  function renderJogos() {
    mainContent.innerHTML = `<div class="view-header"><div class="view-title">Jogos</div><div class="view-subtitle">em breve</div></div><div class="empty-state"><h3>Panela no fogo</h3><p>Os jogos estão infundindo. Volte em breve para jogar uma partida enquanto o chá esfria.</p></div>`;
  }

  async function renderFacetas() {
    if (!profile) { mainContent.innerHTML = '<div class="loading-spinner">Carregando perfil...</div>'; return; }
    const targetId = viewingProfileId || profile.id;
    const { data: items, error } = await db.from('facetas').select('*').eq('user_id', targetId).order('created_at', { ascending: false });
    if (error) { mainContent.innerHTML = `<div class="empty-state"><h3>Erro</h3><p>${error.message}</p></div>`; return; }
    const grid = (items || []).map(f => `
      <div class="gallery-card" data-id="${f.id}">
        <div class="gallery-card-image">${f.image_url ? `<img src="${f.image_url}" alt="${escapeAttr(f.name)}">` : `<div class="gallery-card-image-placeholder">${f.name.charAt(0).toUpperCase()}</div>`}</div>
        <div class="gallery-card-info"><div class="gallery-card-name">${escapeHtml(f.name)}</div><div class="gallery-card-meta">personagem</div></div>
        ${viewingProfileId ? '' : `<button class="gallery-card-delete" data-delete="${f.id}" aria-label="Remover">×</button>`}
      </div>
    `).join('');
    mainContent.innerHTML = `
      <div class="view-header"><div><div class="view-title">Facetas</div></div><div class="view-subtitle">${items?.length || 0} ${(items?.length || 0) === 1 ? 'personagem' : 'personagens'}</div></div>
      <div class="gallery-grid">${grid}${viewingProfileId ? '' : `<button class="gallery-add" id="addFaceta"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Criar personagem</button>`}</div>
    `;
    if (!viewingProfileId) {
      document.getElementById('addFaceta').addEventListener('click', () => openCreateModal('faceta'));
      document.querySelectorAll('.gallery-card-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation(); const id = btn.dataset.delete;
          await db.from('facetas').delete().eq('id', id);
          if (selectedCharacterId === id) selectedCharacterId = null;
          render(); toast('Personagem removido.', 'success');
        });
      });
    }
  }

  async function renderRealismo() {
    if (!profile) { mainContent.innerHTML = '<div class="loading-spinner">Carregando perfil...</div>'; return; }
    const targetId = viewingProfileId || profile.id;
    const { data: items, error } = await db.from('realismo').select('*').eq('user_id', targetId).order('created_at', { ascending: false });
    if (error) { mainContent.innerHTML = `<div class="empty-state"><h3>Erro</h3><p>${error.message}</p></div>`; return; }
    const grid = (items || []).map(r => `
      <div class="gallery-card" data-id="${r.id}">
        <div class="gallery-card-image">${r.image_url ? `<img src="${r.image_url}" alt="${escapeAttr(r.name)}">` : `<div class="gallery-card-image-placeholder">${r.name.charAt(0).toUpperCase()}</div>`}</div>
        <div class="gallery-card-info"><div class="gallery-card-name">${escapeHtml(r.name)}</div><div class="gallery-card-meta">obra</div></div>
        ${viewingProfileId ? '' : `<button class="gallery-card-delete" data-delete="${r.id}" aria-label="Remover">×</button>`}
      </div>
    `).join('');
    mainContent.innerHTML = `
      <div class="view-header"><div><div class="view-title">Realismo</div></div><div class="view-subtitle">${items?.length || 0} ${(items?.length || 0) === 1 ? 'obra' : 'obras'}</div></div>
      <div class="gallery-grid">${grid}${viewingProfileId ? '' : `<button class="gallery-add" id="addRealismo"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Adicionar obra</button>`}</div>
    `;
    if (!viewingProfileId) {
      document.getElementById('addRealismo').addEventListener('click', () => openCreateModal('realismo'));
      document.querySelectorAll('.gallery-card-delete').forEach(btn => {
        btn.addEventListener('click', async (e) => {
          e.stopPropagation(); const id = btn.dataset.delete;
          await db.from('realismo').delete().eq('id', id);
          render(); toast('Obra removida.', 'success');
        });
      });
    }
  }

  async function openCreateModal(type) {
    const isFaceta = type === 'faceta';
    const label = isFaceta ? 'Nome do personagem' : 'Título da obra';
    const cta = isFaceta ? 'Criar personagem' : 'Adicionar obra';
    openModal(`
      <div class="modal-header"><h3>${isFaceta ? 'Novo personagem' : 'Nova obra'}</h3><button class="modal-close" aria-label="Fechar">×</button></div>
      <div class="form-group"><label class="form-label">Imagem</label><div class="upload-zone" id="createUploadZone"><div class="upload-preview" id="createPreview"><div class="upload-preview-placeholder">+</div></div><div class="upload-hint"><strong>Clique para enviar</strong><br>Será cortada ao centro em <strong>1:1</strong>.<br>Máximo <strong>3 MB</strong>.</div><input type="file" id="createInput" accept="image/*" style="display:none"></div></div>
      <div class="form-group"><label class="form-label">${label}</label><input type="text" class="form-input" id="createName" maxlength="60"></div>
      <div class="edit-actions"><button class="btn btn-secondary" id="cancelCreateBtn" type="button">Cancelar</button><button class="btn btn-primary" id="saveCreateBtn" type="button" style="width:auto">${cta}</button></div>
    `);
    let pendingBlob = null;
    const uploadZone = document.getElementById('createUploadZone');
    const createInput = document.getElementById('createInput');
    const createPreview = document.getElementById('createPreview');
    uploadZone.addEventListener('click', () => createInput.click());
    createInput.addEventListener('change', async () => {
      const file = createInput.files[0]; if (!file) return;
      try {
        const blob = await processGalleryImage(file);
        pendingBlob = blob;
        const url = URL.createObjectURL(blob);
        createPreview.innerHTML = `<img src="${url}" alt="">`;
      } catch(err) { toast(err, 'error'); }
    });
    document.getElementById('cancelCreateBtn').addEventListener('click', closeModal);
    document.getElementById('saveCreateBtn').addEventListener('click', async () => {
      const name = document.getElementById('createName').value.trim();
      if (!name) { toast('Preencha o nome.', 'error'); return; }
      if (!pendingBlob) { toast('Envie uma imagem.', 'error'); return; }
      const saveBtn = document.getElementById('saveCreateBtn');
      saveBtn.textContent = 'Salvando...'; saveBtn.disabled = true;
      try {
        const path = `${type}_${profile.id}_${Date.now()}.jpg`;
        const imageUrl = await uploadFile('gallery', path, pendingBlob);
        const table = isFaceta ? 'facetas' : 'realismo';
        const { error: insertError } = await db.from(table).insert([{ user_id: profile.id, name, image_url: imageUrl }]);
        if (insertError) { toast('Erro ao salvar: ' + insertError.message, 'error'); saveBtn.textContent = cta; saveBtn.disabled = false; return; }
        closeModal(); render();
        toast(isFaceta ? 'Personagem criado.' : 'Obra adicionada.', 'success');
      } catch (err) { toast(err.message || 'Erro ao enviar imagem.', 'error'); saveBtn.textContent = cta; saveBtn.disabled = false; }
    });
    document.querySelector('.modal-close').addEventListener('click', closeModal);
  }

  /* ---------- RABISCO ---------- */
  async function renderRabisco() {
    if (!profile) { mainContent.innerHTML = '<div class="loading-spinner">Carregando perfil...</div>'; return; }
    if (currentTopicId) return renderTopic();
    const joinedTopics = profile.joined_topics || [];
    let filter = `user_id.eq.${profile.id}`;
    if (joinedTopics.length > 0) { filter += `,id.in.(${joinedTopics.join(',')})`; }
    try {
      const { data: topics, error } = await db.from('topics')
        .select('*, messages(content, created_at, author_character_id), profiles(name)')
        .or(filter).order('created_at', { ascending: false });
      if (error) throw error;
      const listHTML = (topics || []).map(t => {
        const msgs = t.messages || [];
        const lastMsg = msgs[msgs.length - 1];
        const preview = lastMsg ? stripHtml(sanitizeHTML(lastMsg.content)).slice(0, 140) : 'Nenhuma mensagem ainda.';
        let lastCharName = 'personagem removido';
        let authorName = '';
        if (t.user_id !== profile.id && t.profiles) { authorName = ' · por ' + t.profiles.name; }
        return `
          <div class="forum-topic" data-topic="${t.id}">
            <div class="forum-topic-header"><h3>${escapeHtml(t.title)}</h3><div class="forum-topic-meta">${formatDate(t.created_at)}</div></div>
            <div class="forum-topic-preview">${escapeHtml(preview)}</div>
            <div class="forum-topic-stats">${msgs.length} ${msgs.length === 1 ? 'mensagem' : 'mensagens'}${lastCharName ? ' · última por ' + escapeHtml(lastCharName) : ''}${authorName}</div>
          </div>
        `;
      }).join('');
      mainContent.innerHTML = `
        <div class="view-header"><div class="view-title">Rabisco</div><div class="view-subtitle">${topics?.length || 0} ${(topics?.length || 0) === 1 ? 'página' : 'páginas'}</div></div>
        <div class="forum-actions"><button class="forum-create-circle" id="createTopicBtn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Criar rabisco</button><button class="forum-find-btn" id="findTopicBtn">Encontrar rabisco</button></div>
        ${topics.length === 0 ? `<div class="empty-state"><h3>Sem rabiscos ainda</h3><p>Crie uma página ou encontre uma pelo código para começar a conversar.</p></div>` : `<div class="forum-list">${listHTML}</div>`}
      `;
      document.getElementById('createTopicBtn').addEventListener('click', openCreateTopic);
      document.getElementById('findTopicBtn').addEventListener('click', openFindTopic);
      document.querySelectorAll('.forum-topic').forEach(el => {
        el.addEventListener('click', () => { currentTopicId = el.dataset.topic; render(); });
      });
    } catch (err) {
      console.error('Erro no Rabisco:', err);
      mainContent.innerHTML = `<div class="empty-state"><h3>Erro no Rabisco</h3><p>${err.message}</p></div>`;
    }
  }

  function openCreateTopic() {
    openModal(`
      <div class="modal-header"><h3>Nova página</h3><button class="modal-close" aria-label="Fechar">×</button></div>
      <div class="form-group"><label class="form-label">Título</label><input type="text" class="form-input" id="topicTitle" maxlength="100" placeholder="Dê um nome a este rabisco"></div>
      <div class="edit-actions"><button class="btn btn-secondary" id="cancelTopicBtn" type="button">Cancelar</button><button class="btn btn-primary" id="createTopicConfirm" type="button" style="width:auto">Criar</button></div>
    `);
    document.getElementById('cancelTopicBtn').addEventListener('click', closeModal);
    document.querySelector('.modal-close').addEventListener('click', closeModal);
    document.getElementById('createTopicConfirm').addEventListener('click', async () => {
      const title = document.getElementById('topicTitle').value.trim();
      if (!title) { toast('Dê um título à página.', 'error'); return; }
      const code = generateCode();
      const { data: topic, error } = await db.from('topics').insert([{ user_id: profile.id, title, code }]).select().single();
      if (error) { toast('Erro ao criar: ' + error.message, 'error'); return; }
      closeModal(); currentTopicId = topic.id; render();
      toast('Página criada. Código: ' + code, 'success');
    });
  }

  function openFindTopic() {
    openModal(`
      <div class="modal-header"><h3>Encontrar Rabisco</h3><button class="modal-close" aria-label="Fechar">×</button></div>
      <div class="form-group"><label class="form-label">Nome do usuário</label><input type="text" class="form-input" id="findTopicUser" placeholder="Ex: Maria"></div>
      <div class="form-group"><label class="form-label">Código do Rabisco</label><input type="text" class="form-input" id="findTopicCode" maxlength="6" placeholder="Ex: A1B2C3" style="text-transform: uppercase;"></div>
      <div class="edit-actions"><button class="btn btn-secondary" id="cancelFindBtn" type="button">Cancelar</button><button class="btn btn-primary" id="findTopicConfirm" type="button" style="width:auto">Encontrar</button></div>
    `);
    document.getElementById('cancelFindBtn').addEventListener('click', closeModal);
    document.querySelector('.modal-close').addEventListener('click', closeModal);
    document.getElementById('findTopicConfirm').addEventListener('click', async () => {
      const userName = document.getElementById('findTopicUser').value.trim().toLowerCase();
      const code = document.getElementById('findTopicCode').value.trim().toUpperCase();
      if (!userName || !code) { toast('Preencha todos os campos.', 'error'); return; }
      const { data: foundUser, error: userError } = await db.from('profiles').select('id').ilike('name', userName).single();
      if (userError || !foundUser) { toast('Usuário não encontrado.', 'error'); return; }
      const { data: topic, error: topicError } = await db.from('topics').select('*').eq('user_id', foundUser.id).eq('code', code).single();
      if (topicError || !topic) { toast('Rabisco não encontrado.', 'error'); return; }
      const newJoined = [...(profile.joined_topics || []), topic.id];
      await db.from('profiles').update({ joined_topics: newJoined }).eq('id', profile.id);
      await loadProfile();
      closeModal(); currentTopicId = topic.id; render();
      toast('Rabisco encontrado.', 'success');
    });
  }

  async function renderTopic() {
    if (!profile) { mainContent.innerHTML = '<div class="loading-spinner">Carregando perfil...</div>'; return; }
    const { data: topic, error: topicError } = await db.from('topics').select('*').eq('id', currentTopicId).single();
    if (topicError || !topic) { currentTopicId = null; return renderRabisco(); }
    const { data: msgs, error: msgsError } = await db.from('messages').select('*, facetas(name, image_url)').eq('topic_id', topic.id).order('created_at', { ascending: true });
    if (msgsError) { mainContent.innerHTML = `<div class="empty-state"><h3>Erro</h3><p>${msgsError.message}</p></div>`; return; }
    const { data: userCharacters, error: charsError } = await db.from('facetas').select('*').eq('user_id', profile.id);
    if (charsError) { mainContent.innerHTML = `<div class="empty-state"><h3>Erro</h3><p>${charsError.message}</p></div>`; return; }
    
    const isOwner = topic.user_id === profile.id;
    const deleteBtnHTML = isOwner ? `<button class="back-btn delete-btn" id="deleteTopicBtn">Excluir</button>` : '';

    if (userCharacters.length === 0) selectedCharacterId = null;
    else if (!selectedCharacterId || !userCharacters.find(f => f.id === selectedCharacterId)) selectedCharacterId = userCharacters[0].id;

    const msgsHTML = (msgs || []).map(m => {
      const character = m.facetas;
      const authorName = character ? character.name : 'Personagem removido';
      const authorAvatar = character ? character.image_url : '';
      const initial = authorName.charAt(0).toUpperCase();
      const avatarHTML = authorAvatar ? `<img src="${authorAvatar}" alt="">` : `<div class="message-avatar-placeholder">${initial}</div>`;
      return `<div class="message">
        <div class="message-header">
          <div class="message-avatar" onclick="viewProfile('${m.user_id}')">${avatarHTML}</div>
          <div>
            <div class="message-author" onclick="viewProfile('${m.user_id}')">${escapeHtml(authorName)}</div>
            <div class="message-time">${formatDate(m.created_at)}</div>
          </div>
        </div>
        <div class="message-body">${sanitizeHTML(m.content)}</div>
      </div>`;
    }).join('');

    let characterSelectorHTML;
    if (userCharacters.length === 0) {
      characterSelectorHTML = `<div class="character-selector"><div class="character-empty">Você precisa de um personagem para publicar. Crie um em <strong id="goToFacetas">Facetas</strong>.</div></div>`;
    } else {
      const chipsHTML = userCharacters.map(f => `<button class="character-chip ${f.id === selectedCharacterId ? 'selected' : ''}" data-char="${f.id}" type="button"><div class="character-chip-avatar">${f.image_url ? `<img src="${f.image_url}" alt="">` : `<div class="placeholder">${f.name.charAt(0).toUpperCase()}</div>`}</div><div class="character-chip-name">${escapeHtml(f.name)}</div></button>`).join('');
      characterSelectorHTML = `<div class="character-selector"><div class="character-selector-label">Postar como</div><div class="character-list">${chipsHTML}</div></div>`;
    }

    mainContent.innerHTML = `
      <div class="forum-detail">
        <div class="forum-detail-header"><div><h2>${escapeHtml(topic.title)}</h2><div class="topic-code">Código: ${topic.code}</div></div><div style="display: flex; gap: 0.5rem;"><button class="back-btn" id="backToTopics">← Voltar</button>${deleteBtnHTML}</div></div>
        ${msgs.length === 0 ? `<div class="empty-state"><h3>Sem mensagens</h3><p>Escreva a primeira mensagem desta página abaixo.</p></div>` : msgsHTML}
        <div class="composer">
          <div class="mode-toggle"><span class="mode-label">Modo</span><button class="mode-btn active" data-mode="simple" type="button">Simples</button><button class="mode-btn" data-mode="advanced" type="button">Avançado HTML5</button></div>
          <div class="toolbar" id="msgToolbar"><button class="tool-btn" data-cmd="bold" type="button"><b>B</b></button><button class="tool-btn" data-cmd="italic" type="button"><i>I</i></button><button class="tool-btn" data-cmd="underline" type="button"><u>U</u></button><div class="tool-divider"></div><button class="tool-btn" data-cmd="formatBlock" data-val="h2" type="button">Título</button><button class="tool-btn" data-cmd="formatBlock" data-val="blockquote" type="button">Citação</button><button class="tool-btn" data-cmd="formatBlock" data-val="p" type="button">Texto</button><div class="tool-divider"></div><button class="tool-btn" data-cmd="justifyLeft" type="button">⬅</button><button class="tool-btn" data-cmd="justifyCenter" type="button">⬌</button><button class="tool-btn" data-cmd="justifyRight" type="button">➡</button><button class="tool-btn" data-cmd="justifyFull" type="button">⬍</button><div class="tool-divider"></div><button class="tool-btn" data-cmd="insertUnorderedList" type="button">• Lista</button><button class="tool-btn" data-cmd="insertOrderedList" type="button">1. Lista</button><button class="tool-btn" data-cmd="createLink" type="button">🔗 Link</button><button class="tool-btn" data-cmd="formatBlock" data-val="pre" type="button">Código</button></div>
          <div class="composer-editor" id="msgEditor" contenteditable="true" data-placeholder="Escreva sua mensagem..."></div>
          <textarea class="composer-textarea" id="msgTextarea" placeholder="<p>Escreva em HTML5 livre...</p>"></textarea>
          <div class="composer-actions"><span class="composer-hint">Simples: formatação rápida. Avançado: HTML5 completo.</span><button class="btn btn-primary" id="postMsgBtn" type="button" style="width:auto">Publicar</button></div>
          ${characterSelectorHTML}
        </div>
      </div>
    `;
    document.getElementById('backToTopics').addEventListener('click', () => { currentTopicId = null; render(); });
    if (isOwner) {
      document.getElementById('deleteTopicBtn').addEventListener('click', () => {
        openModal(`<div class="modal-header"><h3>Excluir Rabisco</h3><button class="modal-close" aria-label="Fechar">×</button></div><p style="margin-bottom: 1.5rem; font-size: 0.9rem; line-height: 1.6; color: var(--ink-soft);">Tem certeza que deseja excluir este rabisco? Todas as mensagens serão perdidas.</p><div class="edit-actions"><button class="btn btn-secondary" id="cancelDeleteTopic" type="button">Cancelar</button><button class="btn btn-primary" id="confirmDeleteTopic" type="button" style="width:auto; background: var(--danger);">Excluir</button></div>`);
        document.getElementById('cancelDeleteTopic').addEventListener('click', closeModal);
        document.querySelector('.modal-close').addEventListener('click', closeModal);
        document.getElementById('confirmDeleteTopic').addEventListener('click', async () => {
          await db.from('topics').delete().eq('id', topic.id);
          closeModal(); currentTopicId = null; render();
          toast('Rabisco excluído.', 'success');
        });
      });
    }

    let currentMode = 'simple';
    const editor = document.getElementById('msgEditor');
    const textarea = document.getElementById('msgTextarea');
    const toolbar = document.getElementById('msgToolbar');
    mainContent.querySelectorAll('.mode-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const mode = btn.dataset.mode; if (mode === currentMode) return;
        if (mode === 'advanced') textarea.value = editor.innerHTML.trim();
        else editor.innerHTML = sanitizeHTML(textarea.value);
        currentMode = mode;
        mainContent.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
        editor.classList.toggle('hide', mode !== 'simple');
        textarea.classList.toggle('show', mode === 'advanced');
        toolbar.style.display = mode === 'simple' ? 'flex' : 'none';
      });
    });
    toolbar.querySelectorAll('.tool-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.preventDefault(); const cmd = btn.dataset.cmd; const val = btn.dataset.val; editor.focus();
        if (cmd === 'createLink') { const url = prompt('Endereço do link:', 'https://'); if (url) document.execCommand('createLink', false, url); }
        else if (cmd === 'formatBlock') { document.execCommand('formatBlock', false, val); }
        else { document.execCommand(cmd, false, null); }
      });
    });
    mainContent.querySelectorAll('.character-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        selectedCharacterId = chip.dataset.char;
        mainContent.querySelectorAll('.character-chip').forEach(c => c.classList.toggle('selected', c === chip));
      });
    });
    const goToFacetas = document.getElementById('goToFacetas');
    if (goToFacetas) goToFacetas.addEventListener('click', () => navigate('facetas'));
    document.getElementById('postMsgBtn').addEventListener('click', async () => {
      const content = currentMode === 'advanced' ? textarea.value : editor.innerHTML;
      if (!content.trim() || content === '<br>') { toast('Escreva algo antes.', 'error'); return; }
      if (!selectedCharacterId) { toast('Crie um personagem em Facetas primeiro.', 'error'); return; }
      await db.from('messages').insert([{ topic_id: topic.id, user_id: profile.id, author_character_id: selectedCharacterId, content }]);
      render();
    });
  }

  function escapeHtml(s) { if (s == null) return ''; return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function escapeAttr(s) { return escapeHtml(s); }
  function stripHtml(html) { const tmp = document.createElement('div'); tmp.innerHTML = html; return (tmp.textContent || tmp.innerText || '').trim(); }
  function formatDate(ts) { if (!ts) return ''; const d = new Date(ts); const months = ['jan','fev','mar','abr','mai','jun','jul','ago','set','out','nov','dez']; return d.getDate() + ' ' + months[d.getMonth()] + ' ' + d.getFullYear(); }
  function generateCode() { const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'; let code = ''; for (let i = 0; i < 6; i++) code += chars.charAt(Math.floor(Math.random() * chars.length)); return code; }

  init();
})();
</script>
</body>
</html>
